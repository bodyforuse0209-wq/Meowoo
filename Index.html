<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Cat Time – 貓咪時鐘</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-gradient"></div>

  <main class="clock-container">
    <div class="title">Cat Time</div>
    <div class="time">
      <span id="hours">00</span>
      <span class="colon">:</span>
      <span id="minutes">00</span>
      <span class="colon">:</span>
      <span id="seconds">00</span>
    </div>
    <div class="date" id="date"></div>
  </main>

  <div class="cat-wrapper">
    <div class="cat">
      <div class="cat-ear left"></div>
      <div class="cat-ear right"></div>
      <div class="cat-face">
        <div class="cat-eye left">
          <div class="cat-pupil"></div>
        </div>
        <div class="cat-eye right">
          <div class="cat-pupil"></div>
        </div>
        <div class="cat-nose"></div>
        <div class="cat-mouth"></div>
        <div class="cat-whisker left"></div>
        <div class="cat-whisker right"></div>
      </div>
      <div class="cat-body"></div>
      <div class="cat-tail"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
